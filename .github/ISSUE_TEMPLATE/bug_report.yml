---
name: Report an issue with Pac-Man for Home Assistant
description: Report a malfunction, unexpected behavior, or other issue with Pac-Man for Home Assistant.
body:
  - type: markdown
    attributes:
      value: |
        ### ✋ **This bug tracker is for reporting issues only!**

        If you have a feature or enhancement request, please use the
        [feature request form](https://github.com/robemmerson/home-assistant-pacman/issues/new?template=feature_request.yml) instead.

        ---

        **Thanks for wanting to report an issue you've found! 🎮**

        Could you please make sure your issue wasn't reported already?

        If it was, please add a 👍 reaction to the existing issue instead of creating a new one.
        Also, check the closed issues to see if your issue has been fixed already (but maybe not released yet).

        Thanks for taking the time to contribute! 🙌

        ---

  - type: input
    id: version
    validations:
      required: true
    attributes:
      label: What version of Pac-Man for Home Assistant are you using?

  - type: input
    id: homeassistant
    validations:
      required: true
    attributes:
      label: What version of Home Assistant are you using?
      description: >
        Can be found in: [**Settings** >
        **About**](https://my.home-assistant.io/redirect/info/).

  - type: textarea
    validations:
      required: true
    attributes:
      label: The problem
      description: >-
        Describe the issue you are experiencing here. Tell us what you were
        trying to do step by step, and what happened that you did not expect.

        Provide a clear and concise description of what the problem is and
        include as many details as possible.

        Tip: You can paste screenshots in this field too! 📸

  - type: textarea
    attributes:
      label: Anything in the logs? Paste it here!
      description: |
        Be sure to check your [Home Assistant
        logs](https://my.home-assistant.io/redirect/logs/) for anything
        that might be related and helpful to include. Paste them here!
      render: plain text
